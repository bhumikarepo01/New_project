<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>{{ post.title }}</h2>

    <p>{{ post.content }}</p>
    <p><b>Author:</b>{{ post.author_name }}</p>

    <hr>

    <h3>Comments</h3>

    {% for c in comments %}
    <p>
    <b>{{ c.name }}:</b>{{ c.comment_text }}
    </p>
    {% endfor %}

    <hr>

    <h3>Add Comment</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p}}
        <button type="submit">Add Comment</button>
    </form>

    <a href="{% url 'post_list' %}">Back</a>
</body>
</html>
