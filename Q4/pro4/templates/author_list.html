<!DOCTYPE html>
<html>
<head>
    <title>Authors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">📚 Authors</h2>

    <div class="mb-3">
        <a href="{% url 'author_create' %}" class="btn btn-primary">+ Add Author</a>
        <a href="{% url 'book_create' %}" class="btn btn-success">+ Add Book</a>
    </div>

    <div class="row">
        {% for a in authors %}
        <div class="col-md-4">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title">{{ a.name }}</h5>
                    <a href="{% url 'author_detail' a.id %}" class="btn btn-outline-primary btn-sm">
                        View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
