<!DOCTYPE html>
<html>
<head>
    <title>Author Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2>{{ author.name }}</h2>
        <p><strong>Biography:</strong> {{ author.biography }}</p>
        <p><strong>Birthdate:</strong> {{ author.birthdate }}</p>
    </div>

    <h3 class="mt-4">📖 Books</h3>

    <ul class="list-group">
        {% for b in books %}
            <li class="list-group-item">
                <strong>{{ b.title }}</strong> ({{ b.published_date }})
            </li>
        {% empty %}
            <li class="list-group-item text-muted">No books available</li>
        {% endfor %}
    </ul>

    <a href="{% url 'author_list' %}" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
