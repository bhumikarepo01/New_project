<h2>Products</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Action</th>
    </tr>

    {% for p in products %}
    <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.price }}</td>
        <td>
            <a href="{% url 'product_detail' p.id %}">View</a>
        </td>
    </tr>
    {% endfor %}
</table>
